openapi: 3.0.3
info:
  title: Agentic Intent Protocol (AIP)
  version: "1.0"
  description: |
    The Agentic Intent Protocol (AIP) defines how AI platforms, brand agents, and ad networks
    communicate to power conversational and agentic advertising.
    This reference describes the standard AIP endpoints implemented by the AdMesh Ad Network.

servers:
  - url: https://api.admesh.ai
    description: AdMesh Exchange (Production)
  - url: https://sandbox.admesh.ai
    description: Sandbox Environment

tags:
  - name: Requests
    description: Platform requests to initiate auctions
  - name: Bidding
    description: brand agents submit bids
  - name: Events
    description: Track CPX, CPC, and CPA lifecycle events
  - name: Ledger
    description: Inspect final states for serve tokens
  - name: Payouts
    description: Platform balance and payout requests

components:
  securitySchemes:
    HMACAuth:
      type: apiKey
      in: header
      name: X-AIP-Signature
      description: >
        HMAC-SHA256 signature using shared secret, computed over method, path, body, timestamp, and nonce.
  parameters:
    VersionHeader:
      name: X-AIP-Version
      in: header
      required: true
      schema:
        type: string
        example: "1.0"
    NonceHeader:
      name: X-Nonce
      in: header
      required: true
      schema:
        type: string
        example: "n_1b92e"
    TsHeader:
      name: X-Timestamp
      in: header
      required: true
      schema:
        type: string
        format: date-time
        example: "2025-11-11T18:00:00Z"
  schemas:
    PlatformRequest:
      $ref: "../schemas-json/platform-request.json"

    Bid:
      type: object
      required: [bid_id, brand_agent_id, context_id, wallet_id, pricing, offer, timestamp, auth]
      properties:
        bid_id: { type: string, example: "bid_7823" }
        brand_agent_id: { type: string, example: "brand_agent_123" }
        context_id: { type: string, example: "ctx_92f" }
        wallet_id: { type: string, example: "wallet_890" }
        pricing:
          type: object
          required: [cpx]
          properties:
            cpx: { type: string, example: "0.05" }
            cpc: { type: string, example: "0.45" }
            cpa: { type: string, example: "10.00" }
            currency: { type: string, example: "USD" }
        offer:
          type: object
          properties:
            creative_input:
              type: object
              required: [brand_name, product_name, descriptions, value_props, resource_urls, image_urls]
              properties:
                brand_name: { type: string, example: "Nimbus" }
                product_name: { type: string, example: "Nimbus CRM Pro" }
                descriptions:
                  type: array
                  items: { type: string }
                  example: ["AI-native CRM for 5-50 person teams."]
                value_props:
                  type: array
                  items: { type: string }
                  example: ["Automated pipeline insights", "Embedded copilots"]
                resource_urls:
                  type: array
                  items: { type: string, format: uri }
                  example: ["https://nimbus.example/signup"]
                image_urls:
                  type: array
                  items: { type: string, format: uri }
                  example: ["https://cdn.example.com/nimbus/crm.png"]
        timestamp:
          type: string
          format: date-time
        auth:
          type: object
          required: [nonce, signature]
          properties:
            nonce: { type: string, example: "nonce_456" }
            signature: { type: string, example: "sig_789" }
        extensions:
          type: object
          additionalProperties: true

    PlatformResponse:
      type: object
      required: [spec_version, response_id, auction_id, serve_token, timestamp, status, ttl_ms]
      properties:
        spec_version: { type: string, enum: ["1.0"], example: "1.0" }
        response_id: { type: string, example: "resp_981" }
        auction_id: { type: string, example: "auc_981" }
        serve_token: { type: string, example: "stk_abcxyz123" }
        timestamp: { type: string, format: date-time, example: "2026-03-26T18:00:02Z" }
        status: { type: string, enum: [filled, no_fill, error], example: "filled" }
        winner:
          type: object
          required: [bid_id, brand_agent_id, pricing, billing]
          properties:
            bid_id: { type: string, example: "bid_7823" }
            brand_agent_id: { type: string, example: "ba_451" }
            pricing:
              type: object
              required: [model, price_micros, currency]
              properties:
                model: { type: string, enum: [CPX, CPC, CPA], example: "CPA" }
                price_micros: { type: integer, minimum: 0, example: 10000000 }
                currency: { type: string, example: "USD" }
            billing:
              type: object
              required: [reserved_amount_micros, currency]
              properties:
                reserved_amount_micros: { type: integer, minimum: 0, example: 500000000 }
                currency: { type: string, example: "USD" }
            rank: { type: integer, minimum: 1, example: 1 }
        render:
          type: object
          required: [format, disclosure, creative]
          properties:
            format: { type: string, enum: [weave, tail, product_card, bridge], example: "weave" }
            disclosure: { type: string, example: "[Ad]" }
            creative:
              type: object
              required: [advertiser, ad_assets, landing_page_url, click_url]
              properties:
                advertiser:
                  type: object
                  required: [brand_name]
                  properties:
                    brand_name: { type: string, example: "Nimbus" }
                    domain: { type: string, example: "nimbus.example.com" }
                ad_assets:
                  type: object
                  required: [headline, description, cta_text]
                  properties:
                    headline: { type: string, example: "Scale your CRM" }
                    description: { type: string, example: "Built for founders." }
                    cta_text: { type: string, example: "Try for free" }
                    logo_url: { type: string, format: uri, example: "https://cdn.example.com/nimbus/logo.png" }
                    image_urls:
                      type: array
                      items: { type: string, format: uri }
                      example: ["https://cdn.example.com/nimbus/crm.png"]
                landing_page_url: { type: string, format: uri, example: "https://nimbus.example.com/signup" }
                click_url: { type: string, format: uri, example: "https://admesh.click/stk_abcxyz123" }
        delegation:
          type: object
          properties:
            available: { type: boolean, example: true }
            mode: { type: string, enum: [optional, recommended, required], example: "optional" }
            trigger: { type: string, enum: [user_action, explicit_consent, operator_initiated], example: "user_action" }
            cta_text: { type: string, example: "Continue with Nimbus" }
        tracking:
          type: object
          properties:
            impression_url: { type: string, format: uri, example: "https://track.example.com/impression/stk_abcxyz123" }
            click_url: { type: string, format: uri, example: "https://track.example.com/click/stk_abcxyz123" }
            conversion_url: { type: string, format: uri, example: "https://track.example.com/conversion/stk_abcxyz123" }
        ttl_ms: { type: integer, example: 60000 }
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string, example: "auction_timeout" }
            message: { type: string, example: "Auction evaluation timed out." }
    EventExposureShown:
      type: object
      required: [event_type, serve_token, session_id, platform_id, agent_id, wallet_id, settlement, ts]
      properties:
        event_type: { type: string, const: "exposure_shown" }
        serve_token: { type: string }
        session_id: { type: string }
        platform_id: { type: string }
        agent_id: { type: string }
        wallet_id: { type: string }
        settlement:
          type: object
          required: [unit, amount_micros, currency]
          properties:
            unit: { type: string, enum: ["CPX"] }
            amount_micros: { type: integer, minimum: 0, example: 34000 }
            currency: { type: string, example: "USD" }
        exposure_metadata:
          type: object
          properties:
            surface: { type: string, example: "chat" }
            position: { type: integer, example: 1 }
            visibility_ms: { type: integer, example: 1500 }
        ts: { type: string, format: date-time }

    EventInteractionStarted:
      type: object
      required: [event_type, serve_token, session_id, platform_id, agent_id, wallet_id, settlement, ts]
      properties:
        event_type: { type: string, const: "interaction_started" }
        serve_token: { type: string }
        session_id: { type: string }
        platform_id: { type: string }
        agent_id: { type: string }
        wallet_id: { type: string }
        settlement:
          type: object
          required: [unit, amount_micros, currency]
          properties:
            unit: { type: string, const: "CPC" }
            amount_micros: { type: integer, minimum: 0, example: 450000 }
            currency: { type: string, example: "USD" }
        interaction_metadata:
          type: object
          properties:
            source:
              type: string
              enum: [deep_link, button, voice_confirmation, agent_action]
            position:
              type: integer
              minimum: 1
        ts: { type: string, format: date-time }

    EventDelegationStarted:
      type: object
      required: [event_type, serve_token, session_id, platform_id, agent_id, delegation_session_id, ts]
      properties:
        event_type: { type: string, const: "delegation_started" }
        serve_token: { type: string }
        session_id: { type: string }
        platform_id: { type: string }
        agent_id: { type: string }
        delegation_session_id: { type: string }
        delegation_metadata:
          type: object
          properties:
            context_scope:
              type: array
              items: { type: string }
        ts: { type: string, format: date-time }

    EventTaskCompleted:
      type: object
      required: [event_type, serve_token, session_id, platform_id, agent_id, outcome_type, settlement, ts]
      properties:
        event_type: { type: string, const: "task_completed" }
        serve_token: { type: string }
        session_id: { type: string }
        platform_id: { type: string }
        agent_id: { type: string }
        outcome_type:
          type: string
          enum: [signup, purchase, trial_start, demo_request, download, custom]
        wallet_id: { type: string }
        settlement:
          type: object
          required: [unit, amount_micros, currency]
          properties:
            unit: { type: string, const: "CPA" }
            amount_micros: { type: integer, minimum: 0, example: 10000000 }
            currency: { type: string, pattern: "^[A-Z]{3}$" }
        outcome_value_micros: { type: integer, minimum: 0 }
        outcome_metadata:
          type: object
          properties:
            user_id: { type: string }
            order_id: { type: string }
            product_ids:
              type: array
              items: { type: string }
        ts: { type: string, format: date-time }

    Balance:
      type: object
      properties:
        available_balance: { type: string, example: "3241.25" }
        pending_balance: { type: string, example: "850.75" }
        currency: { type: string, example: "USD" }

    PayoutRequest:
      type: object
      properties:
        amount: { type: string, example: "2500.00" }
        currency: { type: string, example: "USD" }
paths:
  /aip/request:
    post:
      summary: Submit a PlatformRequest
      description: >
        AI platforms send PlatformRequests to AdMesh.
        ContextRequest is operator-generated and downstream-facing only.
        AdMesh returns a PlatformResponse for rendering and downstream event tracking.
      tags: [Requests]
      parameters:
        - $ref: "#/components/parameters/VersionHeader"
        - $ref: "#/components/parameters/NonceHeader"
        - $ref: "#/components/parameters/TsHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PlatformRequest" }
      responses:
        "200":
          description: Platform response with winner state and render payload
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlatformResponse" }

  /aip/bid:
    post:
      summary: Submit a Bid
      tags: [Bidding]
      description: >
        brand agents use this endpoint to place bids on incoming contexts.
        The bid includes CPX, CPC, and CPA values, and a preferred unit.
      parameters:
        - $ref: "#/components/parameters/VersionHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Bid" }
      responses:
        "202":
          description: Bid accepted

  /aip/events:
    post:
      summary: Send lifecycle event
      tags: [Events]
      description: >
        Platforms, operators, and brand agents post lifecycle events representing exposures,
        interactions, operator-recorded delegation starts, or completed outcomes.
        Each serve_token can settle only one final event (CPA > CPC > CPX).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/EventExposureShown"
                - $ref: "#/components/schemas/EventInteractionStarted"
                - $ref: "#/components/schemas/EventDelegationStarted"
                - $ref: "#/components/schemas/EventTaskCompleted"
      responses:
        "202":
          description: Event accepted for processing

  /ledger/{serve_token}:
    get:
      summary: Get ledger record by serve_token
      tags: [Ledger]
      parameters:
        - in: path
          name: serve_token
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Ledger record found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlatformResponse" }

  /platforms/{id}/balance:
    get:
      summary: Get platform balance
      tags: [Payouts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
          example: "pf_chatapp"
      responses:
        "200":
          description: Current balance for platform
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Balance" }

  /payouts/request:
    post:
      summary: Request monthly payout
      tags: [Payouts]
      description: >
        Platforms request payout once per month.
        Funds older than 14 days are eligible for withdrawal.
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PayoutRequest" }
      responses:
        "202":
          description: Payout request accepted
